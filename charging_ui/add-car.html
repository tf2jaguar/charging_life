<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>添加车辆 - EV充电小程序</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0891B2',
            secondary: '#22D3EE',
            cta: '#22C55E',
            'app-bg': '#ECFEFF',
            'app-text': '#164E63',
          },
          fontFamily: {
            sans: ['Fira Sans', 'sans-serif'],
            mono: ['Fira Code', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
  </style>
</head>

<body class="bg-app-bg font-sans min-h-screen pb-24">
  <!-- 状态栏 -->
  <div class="bg-white text-slate-600 px-4 py-2 flex justify-between items-center text-xs border-b border-slate-100">
    <span>09:41</span>
    <div class="flex items-center gap-1">
      <span>100%</span>
    </div>
  </div>

  <!-- 头部 -->
  <header class="bg-white px-4 py-4 border-b border-slate-100 sticky top-0 z-40">
    <div class="flex items-center justify-between">
      <a href="profile.html"
        class="w-10 h-10 flex items-center justify-center cursor-pointer hover:bg-slate-50 rounded-lg transition-colors">
        <svg class="w-6 h-6 text-app-text" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
      </a>
      <h1 class="text-lg font-semibold text-app-text">添加车辆</h1>
      <div class="w-10"></div>
    </div>
  </header>

  <!-- 表单 -->
  <form class="px-4 py-4 space-y-4" onsubmit="return false;">
    <!-- 品牌 -->
    <div class="glass-card rounded-xl p-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" />
        </svg>
        <label class="text-sm font-medium text-slate-600">品牌</label>
      </div>
      <div class="relative">
        <select id="brandSelect"
          class="w-full h-12 px-4 bg-white border border-slate-200 rounded-lg text-app-text appearance-none cursor-pointer focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-colors">
          <option value="">请选择品牌</option>
        </select>
        <svg class="w-5 h-5 text-slate-400 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none" fill="none"
          stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </div>
    </div>

    <!-- 型号 -->
    <div class="glass-card rounded-xl p-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" />
        </svg>
        <label class="text-sm font-medium text-slate-600">型号</label>
      </div>
      <div class="relative">
        <select id="modelSelect"
          class="w-full h-12 px-4 bg-white border border-slate-200 rounded-lg text-app-text appearance-none cursor-pointer focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-colors"
          disabled>
          <option value="">请先选择品牌</option>
        </select>
        <svg class="w-5 h-5 text-slate-400 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none" fill="none"
          stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </div>
    </div>

    <!-- 款式 -->
    <div class="glass-card rounded-xl p-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
        </svg>
        <label class="text-sm font-medium text-slate-600">款式</label>
      </div>
      <div class="relative">
        <select id="trimSelect"
          class="w-full h-12 px-4 bg-white border border-slate-200 rounded-lg text-app-text appearance-none cursor-pointer focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-colors"
          disabled>
          <option value="">请先选择型号</option>
        </select>
        <svg class="w-5 h-5 text-slate-400 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none" fill="none"
          stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </div>
    </div>

    <!-- 电池容量 -->
    <div class="glass-card rounded-xl p-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
        <label class="text-sm font-medium text-slate-600">电池容量</label>
      </div>
      <div class="relative">
        <select id="batterySelect"
          class="w-full h-12 px-4 bg-white border border-slate-200 rounded-lg text-app-text appearance-none cursor-pointer focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-colors"
          disabled>
          <option value="">请先选择款式</option>
        </select>
        <svg class="w-5 h-5 text-slate-400 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none" fill="none"
          stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </div>
      <p id="batteryHint" class="text-xs text-slate-400 mt-2 hidden">根据款式自动匹配，也可手动修改</p>
    </div>

    <!-- 车牌号 -->
    <div class="glass-card rounded-xl p-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        <label class="text-sm font-medium text-slate-600">车牌号</label>
      </div>
      <input id="plateInput" type="text" placeholder="如：沪A·12345"
        class="w-full h-12 px-4 bg-white border border-slate-200 rounded-lg text-app-text font-mono placeholder-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-colors">
    </div>

    <!-- 提交 -->
    <div class="pt-2">
      <button type="submit"
        class="w-full h-14 bg-cta text-white font-semibold rounded-xl hover:bg-cta/90 transition-colors cursor-pointer flex items-center justify-center gap-2 shadow-lg shadow-cta/20">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
        保存车辆
      </button>
    </div>

    <!-- 反馈提示 -->
    <div class="p-4 bg-primary/5 rounded-xl">
      <p class="text-sm text-slate-600">没找到自己的车型和款式？请发邮件反馈
        <a href="mailto:tf2jaguar@gmail.com"
          class="text-primary font-medium hover:underline cursor-pointer">tf2jaguar@gmail.com</a>
      </p>
    </div>
  </form>

  <!-- 底部导航 -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-4 py-2 z-50">
    <div class="max-w-md mx-auto flex justify-around">
      <a href="dashboard.html" class="flex flex-col items-center py-2 cursor-pointer">
        <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        <span class="text-xs text-slate-400 mt-1">首页</span>
      </a>
      <a href="history.html" class="flex flex-col items-center py-2 cursor-pointer">
        <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span class="text-xs text-slate-400 mt-1">记录</span>
      </a>
      <a href="add-record.html" class="flex flex-col items-center -mt-4 cursor-pointer">
        <div class="w-14 h-14 bg-cta rounded-full flex items-center justify-center shadow-lg shadow-cta/30">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>
        </div>
        <span class="text-xs text-slate-400 mt-1">录入</span>
      </a>
      <a href="analytics.html" class="flex flex-col items-center py-2 cursor-pointer">
        <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
        </svg>
        <span class="text-xs text-slate-400 mt-1">分析</span>
      </a>
      <a href="profile.html" class="flex flex-col items-center py-2 cursor-pointer">
        <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
        <span class="text-xs text-slate-400 mt-1">我的</span>
      </a>
    </div>
  </nav>

  <script>
    const vehicleData = {
      '特斯拉': {
        'Model 3': {
          '后轮驱动版': '60 kWh',
          '长续航全轮驱动版': '78.4 kWh',
          '高性能全轮驱动版': '78.4 kWh',
        },
        'Model Y': {
          '后轮驱动版': '60 kWh',
          '长续航全轮驱动版': '78.4 kWh',
          '高性能全轮驱动版': '78.4 kWh',
        },
        'Model S': {
          '双电机全轮驱动版': '100 kWh',
          'Plaid版': '100 kWh',
        },
        'Model X': {
          '双电机全轮驱动版': '100 kWh',
          'Plaid版': '100 kWh',
        },
      },
      '蔚来': {
        'ES6': {
          '75kWh版': '75 kWh',
          '100kWh版': '100 kWh',
        },
        'ET5': {
          '75kWh版': '75 kWh',
          '100kWh版': '100 kWh',
        },
        'ES8': {
          '75kWh版': '75 kWh',
          '100kWh版': '100 kWh',
        },
        'ET7': {
          '75kWh版': '75 kWh',
          '100kWh版': '100 kWh',
        },
      },
      '比亚迪': {
        '汉EV': {
          '标准续航版豪华型': '64.8 kWh',
          '长续航版尊贵型': '76.9 kWh',
          '千山翠限量版': '76.9 kWh',
        },
        '海豹': {
          '550km 标准续航版': '61.4 kWh',
          '700km 长续航版': '82.6 kWh',
          '650km 四驱性能版': '82.6 kWh',
        },
        '元PLUS': {
          '430km 豪华型': '49.9 kWh',
          '510km 旗舰型': '60.5 kWh',
        },
        '唐EV': {
          '600km 尊荣型': '90.3 kWh',
          '730km 旗舰型': '108.8 kWh',
        },
      },
      '小鹏': {
        'P7': {
          '480G': '60.2 kWh',
          '670E': '86.2 kWh',
          '625E 机器人版': '86.2 kWh',
        },
        'G6': {
          '580 长续航 Pro': '66 kWh',
          '755 超长续航 Max': '87.5 kWh',
          '700 四驱性能 Max': '87.5 kWh',
        },
        'G9': {
          '570 Pro': '78.2 kWh',
          '702 Max': '98 kWh',
          '650 四驱性能 Max': '98 kWh',
        },
      },
      '理想': {
        'L7': {
          'Air版': '42.8 kWh',
          'Pro版': '42.8 kWh',
          'Max版': '42.8 kWh',
        },
        'L8': {
          'Pro版': '42.8 kWh',
          'Max版': '42.8 kWh',
        },
        'L9': {
          'Max版': '44.5 kWh',
        },
        'MEGA': {
          'Max版': '102.7 kWh',
        },
      },
      '极氪': {
        '001': {
          'WE版 86kWh': '86 kWh',
          'WE版 100kWh': '100 kWh',
          'ME版': '100 kWh',
          'YOU版': '100 kWh',
        },
        '007': {
          '后驱版 75kWh': '75 kWh',
          '后驱版 100kWh': '100 kWh',
          '四驱版': '100 kWh',
        },
        '009': {
          'WE版': '116 kWh',
          'ME版': '140 kWh',
        },
      },
    };

    const brandSelect = document.getElementById('brandSelect');
    const modelSelect = document.getElementById('modelSelect');
    const trimSelect = document.getElementById('trimSelect');
    const batterySelect = document.getElementById('batterySelect');
    const batteryHint = document.getElementById('batteryHint');

    // Populate brands
    Object.keys(vehicleData).forEach(function (brand) {
      const opt = document.createElement('option');
      opt.value = brand;
      opt.textContent = brand;
      brandSelect.appendChild(opt);
    });

    function resetSelect(select, placeholder) {
      select.innerHTML = '<option value="">' + placeholder + '</option>';
      select.disabled = true;
    }

    brandSelect.addEventListener('change', function () {
      resetSelect(modelSelect, '请选择型号');
      resetSelect(trimSelect, '请先选择型号');
      resetSelect(batterySelect, '请先选择款式');
      batteryHint.classList.add('hidden');

      const brand = this.value;
      if (!brand) return;

      const models = vehicleData[brand];
      Object.keys(models).forEach(function (model) {
        const opt = document.createElement('option');
        opt.value = model;
        opt.textContent = model;
        modelSelect.appendChild(opt);
      });
      modelSelect.disabled = false;
    });

    modelSelect.addEventListener('change', function () {
      resetSelect(trimSelect, '请选择款式');
      resetSelect(batterySelect, '请先选择款式');
      batteryHint.classList.add('hidden');

      const brand = brandSelect.value;
      const model = this.value;
      if (!brand || !model) return;

      const trims = vehicleData[brand][model];
      Object.keys(trims).forEach(function (trim) {
        const opt = document.createElement('option');
        opt.value = trim;
        opt.textContent = trim;
        trimSelect.appendChild(opt);
      });
      trimSelect.disabled = false;
    });

    trimSelect.addEventListener('change', function () {
      batterySelect.innerHTML = '';
      batteryHint.classList.add('hidden');

      const brand = brandSelect.value;
      const model = modelSelect.value;
      const trim = this.value;
      if (!brand || !model || !trim) return;

      const battery = vehicleData[brand][model][trim];
      const opt = document.createElement('option');
      opt.value = battery;
      opt.textContent = battery;
      batterySelect.appendChild(opt);

      // Add a few common alternatives
      const alternatives = ['50 kWh', '60 kWh', '70 kWh', '75 kWh', '80 kWh', '85 kWh', '90 kWh', '100 kWh'];
      alternatives.forEach(function (val) {
        if (val !== battery) {
          const alt = document.createElement('option');
          alt.value = val;
          alt.textContent = val;
          batterySelect.appendChild(alt);
        }
      });

      batterySelect.disabled = false;
      batteryHint.classList.remove('hidden');
    });
  </script>
</body>

</html>
