<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>充电录入 - EV充电小程序</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0891B2',
            secondary: '#22D3EE',
            cta: '#22C55E',
            'app-bg': '#ECFEFF',
            'app-text': '#164E63',
          },
          fontFamily: {
            sans: ['Fira Sans', 'sans-serif'],
            mono: ['Fira Code', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    input[type="range"] {
      -webkit-appearance: none;
      height: 8px;
      background: #e2e8f0;
      border-radius: 4px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      background: #0891B2;
      border-radius: 50%;
      cursor: pointer;
    }
  </style>
</head>
<body class="bg-app-bg font-sans min-h-screen pb-24">
  <!-- 状态栏 -->
  <div class="bg-white text-slate-600 px-4 py-2 flex justify-between items-center text-xs border-b border-slate-100">
    <span>09:41</span>
    <div class="flex items-center gap-1">
      <span>100%</span>
    </div>
  </div>

  <!-- 头部 -->
  <header class="bg-white px-4 py-4 border-b border-slate-100 sticky top-0 z-40">
    <div class="flex items-center justify-between">
      <a href="dashboard.html" class="w-10 h-10 flex items-center justify-center cursor-pointer hover:bg-slate-50 rounded-lg transition-colors">
        <svg class="w-6 h-6 text-app-text" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <h1 class="text-lg font-semibold text-app-text">充电录入</h1>
      <div class="w-10"></div>
    </div>
  </header>

  <!-- 表单内容 -->
  <form class="px-4 py-4 space-y-4">
    <!-- 选择车辆 -->
    <div class="glass-card rounded-xl p-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h8m-8 4h8m-4 4v3m-4-3h8m-8 0a4 4 0 01-4-4V7a4 4 0 014-4h8a4 4 0 014 4v4a4 4 0 01-4 4m-8 0v3m8-3v3"/>
        </svg>
        <label class="text-sm font-medium text-slate-600">选择车辆</label>
      </div>
      <div class="relative">
        <select class="w-full h-12 px-4 bg-white border border-slate-200 rounded-lg text-app-text appearance-none cursor-pointer focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-colors">
          <option>特斯拉 Model 3 · 后轮驱动版</option>
          <option>蔚来 ES6 · 75kWh版</option>
        </select>
        <svg class="w-5 h-5 text-slate-400 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </div>
    </div>

    <!-- 充电站名称 -->
    <div class="glass-card rounded-xl p-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <label class="text-sm font-medium text-slate-600">充电站名称</label>
      </div>
      <input type="text" placeholder="输入或选择充电站" class="w-full h-12 px-4 bg-white border border-slate-200 rounded-lg text-app-text placeholder-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-colors">
      <!-- 充电类型 -->
      <div class="mt-4">
        <div class="flex items-center gap-2 mb-3">
          <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          <label class="text-sm font-medium text-slate-600">充电类型</label>
        </div>
        <div class="grid grid-cols-3 gap-2">
          <label class="relative cursor-pointer">
            <input type="radio" name="chargeType" value="super" class="peer sr-only">
            <div class="h-14 flex flex-col items-center justify-center gap-1 border-2 border-slate-200 rounded-xl peer-checked:border-violet-500 peer-checked:bg-violet-50 transition-all cursor-pointer">
              <svg class="w-5 h-5 text-slate-400 peer-checked:text-violet-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M13 2L4 14h7l-2 8 9-12h-7l2-8z"/>
                <path d="M17 2L8 14h7l-2 8 9-12h-7l2-8z" opacity="0.4"/>
              </svg>
              <span class="text-xs font-medium text-app-text">超充</span>
            </div>
          </label>
          <label class="relative cursor-pointer">
            <input type="radio" name="chargeType" value="fast" class="peer sr-only" checked>
            <div class="h-14 flex flex-col items-center justify-center gap-1 border-2 border-primary rounded-xl bg-primary/5 transition-all cursor-pointer">
              <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
              </svg>
              <span class="text-xs font-medium text-app-text">快充</span>
            </div>
          </label>
          <label class="relative cursor-pointer">
            <input type="radio" name="chargeType" value="slow" class="peer sr-only">
            <div class="h-14 flex flex-col items-center justify-center gap-1 border-2 border-slate-200 rounded-xl peer-checked:border-emerald-500 peer-checked:bg-emerald-50 transition-all cursor-pointer">
              <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <span class="text-xs font-medium text-app-text">慢充</span>
            </div>
          </label>
        </div>
      </div>
    </div>

    <!-- 充电时间 -->
    <div class="glass-card rounded-xl p-4">
      <div class="flex items-center gap-2 mb-3">
        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <label class="text-sm font-medium text-slate-600">充电时间</label>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs text-slate-500 mb-1.5">开始时间</label>
          <input type="datetime-local" class="w-full h-12 px-4 bg-white border border-slate-200 rounded-lg text-app-text focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-colors">
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1.5">结束时间</label>
          <input type="datetime-local" class="w-full h-12 px-4 bg-white border border-slate-200 rounded-lg text-app-text focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-colors">
        </div>
      </div>
      <div class="mt-3 p-3 bg-primary/5 rounded-lg">
        <p class="text-sm text-slate-600">充电时长: <span class="font-mono font-semibold text-primary">--</span></p>
      </div>
    </div>

    <!-- 充电量与充电费用 -->
    <div class="glass-card rounded-xl p-4">
      <div class="flex items-center gap-2 mb-3">
        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
        </svg>
        <label class="text-sm font-medium text-slate-600">充电量与费用</label>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs text-slate-500 mb-1.5">充电量</label>
          <div class="relative">
            <input type="number" placeholder="0.00" class="w-full h-12 px-4 pr-12 bg-white border border-slate-200 rounded-lg text-app-text font-mono focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-colors">
            <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-slate-400">kWh</span>
          </div>
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1.5">充电费用</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-sm text-slate-400">¥</span>
            <input type="number" placeholder="0.00" class="w-full h-12 pl-8 pr-4 bg-white border border-slate-200 rounded-lg text-app-text font-mono focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-colors">
          </div>
        </div>
      </div>
      <div class="mt-3 p-3 bg-amber-50/80 rounded-lg flex items-center justify-between">
        <p class="text-sm text-slate-600">单价: <span class="font-mono font-semibold text-amber-600">¥1.51</span>/kWh</p>
        <p class="text-sm text-slate-600">平均功率: <span class="font-mono font-semibold text-primary">--</span> kW</p>
      </div>
    </div>

    <!-- 电量信息 -->
    <div class="glass-card rounded-xl p-4">
      <div class="flex items-center gap-2 mb-4">
        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
        <label class="text-sm font-medium text-slate-600">电量信息</label>
      </div>

      <div class="mb-6">
        <div class="flex justify-between items-center mb-2">
          <span class="text-sm text-slate-600">起始电量</span>
          <span class="font-mono font-semibold text-primary">35%</span>
        </div>
        <input type="range" min="0" max="100" value="35" class="w-full">
      </div>

      <div class="mb-4">
        <div class="flex justify-between items-center mb-2">
          <span class="text-sm text-slate-600">结束电量</span>
          <span class="font-mono font-semibold text-cta">90%</span>
        </div>
        <input type="range" min="0" max="100" value="90" class="w-full">
      </div>

      <div class="p-3 bg-cta/5 rounded-lg">
        <p class="text-sm text-slate-600">电量提升: <span class="font-mono font-semibold text-cta">+55%</span></p>
      </div>
    </div>

    <!-- 充电完成时仪表盘总里程 -->
    <div class="glass-card rounded-xl p-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
        </svg>
        <label class="text-sm font-medium text-slate-600">充电完成时仪表盘总里程</label>
      </div>
      <div class="relative">
        <input type="number" placeholder="输入充电完成时的总里程" class="w-full h-12 px-4 pr-12 bg-white border border-slate-200 rounded-lg text-app-text font-mono focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-colors">
        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-sm text-slate-400">km</span>
      </div>
      <p class="text-xs text-slate-400 mt-2">用于计算百公里电耗和成本</p>
    </div>

    <!-- 备注 -->
    <div class="glass-card rounded-xl p-4">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/>
        </svg>
        <label class="text-sm font-medium text-slate-600">备注</label>
      </div>
      <textarea placeholder="添加备注信息..." rows="3" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-lg text-app-text placeholder-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-colors resize-none"></textarea>
    </div>

    <!-- 提交按钮 -->
    <div class="pt-4">
      <button type="submit" class="w-full h-14 bg-cta text-white font-semibold rounded-xl hover:bg-cta/90 transition-colors cursor-pointer flex items-center justify-center gap-2 shadow-lg shadow-cta/20">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        保存记录
      </button>
    </div>
  </form>

  <!-- 底部导航 -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-4 py-2 z-50">
    <div class="max-w-md mx-auto flex justify-around">
      <a href="dashboard.html" class="flex flex-col items-center py-2 cursor-pointer">
        <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span class="text-xs text-slate-400 mt-1">首页</span>
      </a>
      <a href="history.html" class="flex flex-col items-center py-2 cursor-pointer">
        <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span class="text-xs text-slate-400 mt-1">记录</span>
      </a>
      <div class="flex flex-col items-center -mt-4 cursor-pointer">
        <div class="w-14 h-14 bg-cta rounded-full flex items-center justify-center shadow-lg shadow-cta/30">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
        </div>
        <span class="text-xs text-primary font-medium mt-1">录入</span>
      </div>
      <a href="analytics.html" class="flex flex-col items-center py-2 cursor-pointer">
        <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        <span class="text-xs text-slate-400 mt-1">分析</span>
      </a>
      <a href="profile.html" class="flex flex-col items-center py-2 cursor-pointer">
        <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        <span class="text-xs text-slate-400 mt-1">我的</span>
      </a>
    </div>
  </nav>

  <script>
    const chargeTypeColors = {
      super: { border: 'border-violet-500', bg: 'bg-violet-50', icon: 'text-violet-500' },
      fast:  { border: 'border-primary', bg: 'bg-primary/5', icon: 'text-primary' },
      slow:  { border: 'border-emerald-500', bg: 'bg-emerald-50', icon: 'text-emerald-500' },
    };
    const defaultStyle = { border: 'border-slate-200', bg: '', icon: 'text-slate-400' };

    document.querySelectorAll('input[name="chargeType"]').forEach(function(radio) {
      radio.addEventListener('change', function() {
        document.querySelectorAll('input[name="chargeType"]').forEach(function(r) {
          var card = r.nextElementSibling;
          var svg = card.querySelector('svg');
          // Reset
          card.classList.remove('border-primary', 'bg-primary/5', 'border-violet-500', 'bg-violet-50', 'border-emerald-500', 'bg-emerald-50', 'border-slate-200');
          svg.classList.remove('text-primary', 'text-violet-500', 'text-emerald-500', 'text-slate-400');
          if (r.checked) {
            var s = chargeTypeColors[r.value];
            card.classList.add(s.border, s.bg);
            svg.classList.add(s.icon);
          } else {
            card.classList.add(defaultStyle.border);
            svg.classList.add(defaultStyle.icon);
          }
        });
      });
    });
  </script>
</body>
</html>
