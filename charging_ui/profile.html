<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - EV充电小程序</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0891B2',
            secondary: '#22D3EE',
            cta: '#22C55E',
            'app-bg': '#ECFEFF',
            'app-text': '#164E63',
          },
          fontFamily: {
            sans: ['Fira Sans', 'sans-serif'],
            mono: ['Fira Code', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body class="bg-app-bg font-sans min-h-screen pb-20">
  <!-- 状态栏 -->
  <div class="bg-primary text-white px-4 py-2 flex justify-between items-center text-xs">
    <span>09:41</span>
    <div class="flex items-center gap-1">
      <span>100%</span>
    </div>
  </div>

  <!-- 用户信息头部 -->
  <header class="bg-primary text-white px-4 pt-6 pb-8">
    <div class="flex items-center gap-4">
      <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </div>
      <div class="flex-1">
        <h1 class="text-xl font-semibold">张先生</h1>
        <p class="text-white/80 text-sm">138****8888</p>
      </div>
      <button class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center cursor-pointer hover:bg-white/20 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </button>
    </div>

    <!-- 统计卡片 -->
    <div class="glass-card rounded-xl p-4 mt-4 text-app-text">
      <div class="grid grid-cols-3 divide-x divide-slate-200">
        <div class="text-center">
          <p class="text-2xl font-mono font-bold">386</p>
          <p class="text-xs text-slate-500 mt-1">累计充电(kWh)</p>
        </div>
        <div class="text-center">
          <p class="text-2xl font-mono font-bold">¥582</p>
          <p class="text-xs text-slate-500 mt-1">累计费用</p>
        </div>
        <div class="text-center">
          <p class="text-2xl font-mono font-bold">42</p>
          <p class="text-xs text-slate-500 mt-1">充电天数</p>
        </div>
      </div>
    </div>
  </header>

  <!-- 主要内容 -->
  <div class="px-4 py-4 space-y-4">
    <!-- 我的车辆 -->
    <div class="glass-card rounded-xl overflow-hidden">
      <div class="px-4 py-3 flex items-center justify-between border-b border-slate-100">
        <h3 class="font-semibold text-app-text">我的车辆</h3>
        <a href="add-car.html" class="text-sm text-primary cursor-pointer hover:underline">添加</a>
      </div>
      <div class="divide-y divide-slate-100">
        <!-- 车辆1 -->
        <div class="px-4 py-4 flex items-center gap-4 cursor-pointer hover:bg-slate-50 transition-colors">
          <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center">
            <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h8m-8 4h8m-4 4v3m-4-3h8m-8 0a4 4 0 01-4-4V7a4 4 0 014-4h8a4 4 0 014 4v4a4 4 0 01-4 4m-8 0v3m8-3v3"/>
            </svg>
          </div>
          <div class="flex-1 min-w-0">
            <h4 class="font-medium text-app-text">特斯拉 Model 3</h4>
            <p class="text-sm text-slate-500 truncate">后轮驱动版 · 60kWh</p>
          </div>
          <span class="text-xs px-2 py-1 bg-cta/10 text-cta rounded flex-shrink-0">默认</span>
        </div>
        <!-- 车辆2 -->
        <div class="px-4 py-4 flex items-center gap-4 cursor-pointer hover:bg-slate-50 transition-colors">
          <div class="w-12 h-12 bg-secondary/10 rounded-xl flex items-center justify-center">
            <svg class="w-6 h-6 text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h8m-8 4h8m-4 4v3m-4-3h8m-8 0a4 4 0 01-4-4V7a4 4 0 014-4h8a4 4 0 014 4v4a4 4 0 01-4 4m-8 0v3m8-3v3"/>
            </svg>
          </div>
          <div class="flex-1 min-w-0">
            <h4 class="font-medium text-app-text">蔚来 ES6</h4>
            <p class="text-sm text-slate-500 truncate">75kWh版 · 75kWh</p>
          </div>
        </div>
      </div>
    </div>

    <!-- 数据管理 -->
    <div class="glass-card rounded-xl overflow-hidden">
      <div class="px-4 py-3 border-b border-slate-100">
        <h3 class="font-semibold text-app-text">数据管理</h3>
      </div>
      <div class="divide-y divide-slate-100">
        <div class="px-4 py-4 flex items-center justify-between cursor-pointer hover:bg-slate-50 transition-colors">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-violet-100 rounded-lg flex items-center justify-center">
              <svg class="w-5 h-5 text-violet-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
              </svg>
            </div>
            <span class="text-app-text">导出数据</span>
          </div>
          <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </div>
        <div class="px-4 py-4 flex items-center justify-between cursor-pointer hover:bg-slate-50 transition-colors">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-primary/10 rounded-lg flex items-center justify-center">
              <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
              </svg>
            </div>
            <span class="text-app-text">数据备份</span>
          </div>
          <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- 设置 -->
    <div class="glass-card rounded-xl overflow-hidden">
      <div class="px-4 py-3 border-b border-slate-100">
        <h3 class="font-semibold text-app-text">设置</h3>
      </div>
      <div class="divide-y divide-slate-100">
        <!-- 通知提醒 -->
        <div class="px-4 py-4 flex items-center justify-between cursor-pointer hover:bg-slate-50 transition-colors">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-amber-100 rounded-lg flex items-center justify-center">
              <svg class="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
              </svg>
            </div>
            <span class="text-app-text">通知提醒</span>
          </div>
          <div class="w-12 h-7 bg-cta rounded-full relative cursor-pointer">
            <div class="w-5 h-5 bg-white rounded-full absolute right-1 top-1 shadow"></div>
          </div>
        </div>
        <!-- 费用预算 -->
        <div class="px-4 py-4 flex items-center justify-between cursor-pointer hover:bg-slate-50 transition-colors">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-cta/10 rounded-lg flex items-center justify-center">
              <svg class="w-5 h-5 text-cta" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </div>
            <div>
              <span class="text-app-text">费用预算提醒</span>
              <p class="text-xs text-slate-500">每月 ¥800</p>
            </div>
          </div>
          <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </div>
        <!-- 主题设置 -->
        <div class="px-4 py-4 flex items-center justify-between cursor-pointer hover:bg-slate-50 transition-colors">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-slate-100 rounded-lg flex items-center justify-center">
              <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
              </svg>
            </div>
            <span class="text-app-text">主题设置</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-sm text-slate-500">浅色</span>
            <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </div>
        </div>
        <!-- 关于 -->
        <div class="px-4 py-4 flex items-center justify-between cursor-pointer hover:bg-slate-50 transition-colors">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-primary/10 rounded-lg flex items-center justify-center">
              <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </div>
            <span class="text-app-text">关于</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-sm text-slate-500">v1.0.0</span>
            <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- 退出登录 -->
    <button class="w-full py-4 text-red-500 font-medium cursor-pointer hover:bg-red-50 rounded-xl transition-colors">
      退出登录
    </button>
  </div>

  <!-- 底部导航 -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-4 py-2 z-50">
    <div class="max-w-md mx-auto flex justify-around">
      <a href="dashboard.html" class="flex flex-col items-center py-2 cursor-pointer">
        <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span class="text-xs text-slate-400 mt-1">首页</span>
      </a>
      <a href="history.html" class="flex flex-col items-center py-2 cursor-pointer">
        <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span class="text-xs text-slate-400 mt-1">记录</span>
      </a>
      <a href="add-record.html" class="flex flex-col items-center -mt-4 cursor-pointer">
        <div class="w-14 h-14 bg-cta rounded-full flex items-center justify-center shadow-lg shadow-cta/30">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
        </div>
        <span class="text-xs text-slate-400 mt-1">录入</span>
      </a>
      <a href="analytics.html" class="flex flex-col items-center py-2 cursor-pointer">
        <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        <span class="text-xs text-slate-400 mt-1">分析</span>
      </a>
      <div class="flex flex-col items-center py-2 cursor-pointer">
        <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        <span class="text-xs text-primary font-medium mt-1">我的</span>
      </div>
    </div>
  </nav>
</body>
</html>
